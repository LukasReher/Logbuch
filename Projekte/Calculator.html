<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taschenrechner</title>
    <link rel="stylesheet" href="Calculator.css">
</head>
<body>

    <div class="box">
        <div class="inbox">
            <input class="text" id="output" type="text"></input>

            <div>
                <button onclick="number0" class="button">AC</button>
                <button class="button">DEL</button>
                <button class="buttonn">=</button>
            </div>

            <div>
                <button onclick="number1()" class="button">1</button>
                <button onclick="number2()" class="button">2</button>
                <button onclick="number3()" class="button">3</button>
                <button class="button">+</button>
            </div>

            <div>
                <button onclick="number4()" class="button">4</button>
                <button onclick="number5()" class="button">5</button>
                <button onclick="number6()" class="button">6</button>
                <button class="button">-</button>
            </div>

            <div>
                <button onclick="number7()" class="button">7</button>
                <button onclick="number8()" class="button">8</button>
                <button onclick="number9()" class="button">9</button>
                <button class="button">x</button>
            </div>

            <div>
                <button class="button">0</button>
                <button class="button">.</button>
                <button class="button">%</button>
                <button class="button">÷</button>
            </div>
        </div>
    </div>

    <script src="Calculator.js"></script>
</body>
</html>
